<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas - Veterinaria</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .hidden { display: none; }
        .loading { text-align: center; padding: 2rem; }
        .actions-column { display: flex; gap: 0.3rem; }
        .actions-column button { padding: 0.3rem 0.6rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>Gestión de Citas</h1>

    <div class="nav-buttons">
        <a href="/panel"><button>Volver al Panel</button></a>
        <a href="/cita/nuevo"><button>Nueva Cita</button></a>
        <button onclick="cargarCitas()">Actualizar</button>
    </div>

    <div id="loading" class="loading hidden">Cargando citas...</div>
    <div id="error" class="error hidden"></div>

    <div id="citas-container">
        <h2>Lista de Citas</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Paciente</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Motivo</th>
                    <th>Veterinario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="citas-body">
                <!-- Se llenará dinámicamente -->
            </tbody>
        </table>
    </div>

    <script src="/auth-utils.js"></script>
    <script>
        // Verificar autenticación
        requireAuth();

        // Cargar citas al iniciar
        cargarCitas();

        async function cargarCitas() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tbody = document.getElementById('citas-body');

            loading.classList.remove('hidden');
            error.classList.add('hidden');

            try {
                const response = await fetch('/api/citas', {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    if (handleAuthError(response)) return;
                    throw new Error('Error al cargar citas');
                }

                const citas = await response.json();
                tbody.innerHTML = '';

                if (citas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No hay citas registradas</td></tr>';
                    return;
                }

                citas.forEach(cita => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cita.id}</td>
                        <td>${cita.paciente?.nombre || 'N/A'}</td>
                        <td>${cita.fecha || 'N/A'}</td>
                        <td>${cita.hora || 'N/A'}</td>
                        <td>${cita.motivoConsulta || 'N/A'}</td>
                        <td>${cita.veterinarioAsignado || 'N/A'}</td>
                        <td class="actions-column">
                            <a href="/cita/detalle?id=${cita.id}"><button>Ver</button></a>
                            <button onclick="eliminarCita(${cita.id})" class="danger-btn">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                error.textContent = err.message;
                error.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        async function eliminarCita(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar esta cita?')) {
                return;
            }

            try {
                const response = await fetch(`/api/citas/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (!response.ok) {
                    if (handleAuthError(response)) return;
                    throw new Error('Error al eliminar cita');
                }

                alert('Cita eliminada correctamente');
                cargarCitas();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>

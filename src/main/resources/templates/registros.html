<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Registros Médicos</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Registro de Registros Médicos</h1>

<form th:action="@{/registros-medicos}" method="post">
    <label>ID Registro (opcional):</label>
    <input type="number" name="id" min="1" placeholder="Se autogenera si se deja vacío">

    <label>Paciente:</label>
    <select name="pacienteId" required>
        <option value="">-- Seleccionar paciente --</option>
        <option th:each="p : ${pacientes}" th:value="${p.id}" th:text="${p.nombre}"></option>
    </select>

    <label>Veterinario Responsable:</label>
    <select name="veterinarioResponsable" required>
        <option value="">-- Seleccionar veterinario --</option>
        <option th:each="v : ${veterinarios}" th:value="${v}" th:text="${v}"></option>
    </select>

    <label>Diagnóstico Inicial:</label>
    <textarea name="diagnosticoDescripcion" placeholder="Descripción del diagnóstico"></textarea>

    <label>Tratamiento Inicial (nombre):</label>
    <input type="text" name="tratamientoNombre" placeholder="Ej: Terapia antibiótica">

    <label>Tratamiento Inicial (descripción):</label>
    <textarea name="tratamientoDescripcion" placeholder="Descripción del tratamiento"></textarea>

    <label>Tratamiento Inicial (instrucciones):</label>
    <textarea name="tratamientoInstrucciones" placeholder="Instrucciones médicas"></textarea>

    <label>Medicamento Inicial (nombre):</label>
    <input type="text" name="medicamentoNombre" placeholder="Ej: Amoxicilina">

    <label>Dosis:</label>
    <input type="text" name="dosis" placeholder="Ej: 500mg">

    <label>Frecuencia:</label>
    <input type="text" name="frecuencia" placeholder="Ej: Cada 12 horas">

    <label>Vía de administración:</label>
    <input type="text" name="viaAdministracion" placeholder="Ej: Oral">

    <label>Duración (días):</label>
    <input type="number" name="duracionDias" min="0" value="0">

    <label>Nota inicial:</label>
    <textarea name="notaContenido" placeholder="Nota médica"></textarea>

    <label>Autor de la nota:</label>
    <input type="text" name="notaAutor" placeholder="Se usa veterinario si se deja vacío">

    <button type="submit">Registrar Registro Médico</button>
</form>

<div class="nav-buttons">
    <form th:action="@{/home}">
        <button>Regresar</button>
    </form>
</div>

<h2>Lista de Registros Médicos</h2>

<div th:if="${registros.isEmpty()}" class="message">
    <p>No hay registros médicos disponibles.</p>
</div>

<table th:unless="${registros.isEmpty()}">
    <tr>
        <th>ID</th>
        <th>Paciente</th>
        <th>Veterinario</th>
        <th>Fecha de Registro</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="r : ${registros}">
        <td th:text="${r.id}"></td>
        <td th:text="${r.paciente != null ? r.paciente.nombre : 'N/A'}"></td>
        <td th:text="${r.veterinarioResponsable}"></td>
        <td th:text="${r.fechaRegistro != null ? #temporals.format(r.fechaRegistro, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
        <td>
            <a th:href="@{/registros-medicos/{id}(id=${r.id})}">
                <button type="button">Ver detalle</button>
            </a>
        </td>
    </tr>
</table>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Detalle de Registro</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Detalle de Registro Médico</h1>

<div class="message">
    <p><strong>ID:</strong> <span th:text="${registro.id}"></span></p>
    <p><strong>Paciente:</strong> <span th:text="${registro.paciente != null ? registro.paciente.nombre : 'N/A'}"></span></p>
    <p><strong>Veterinario:</strong> <span th:text="${registro.veterinarioResponsable}"></span></p>
    <p><strong>Fecha Registro:</strong> <span th:text="${registro.fechaRegistro != null ? #temporals.format(registro.fechaRegistro, 'dd/MM/yyyy HH:mm') : 'N/A'}"></span></p>
</div>

<h2>Editar Registro</h2>
<form th:action="@{/registros-medicos/{id}(id=${registro.id})}" method="post">
    <label>Paciente:</label>
    <select name="pacienteId" required>
        <option th:each="p : ${pacientes}"
                th:value="${p.id}"
                th:text="${p.nombre}"
                th:selected="${registro.paciente != null and registro.paciente.id == p.id}"></option>
    </select>

    <label>Veterinario Responsable:</label>
    <select name="veterinarioResponsable" required>
        <option th:each="v : ${veterinarios}"
                th:value="${v}"
                th:text="${v}"
                th:selected="${registro.veterinarioResponsable == v}"></option>
    </select>

    <button type="submit">Guardar cambios</button>
</form>

<h2>Diagnósticos</h2>
<table th:if="${!registro.diagnosticos.isEmpty()}">
    <tr>
        <th>Descripción</th>
        <th>Veterinario</th>
        <th>Fecha</th>
    </tr>
    <tr th:each="d : ${registro.diagnosticos}">
        <td th:text="${d.descripcion}"></td>
        <td th:text="${d.veterinario}"></td>
        <td th:text="${d.fecha != null ? #temporals.format(d.fecha, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
    </tr>
</table>
<form th:action="@{/registros-medicos/{id}/diagnostico(id=${registro.id})}" method="post">
    <label>Descripción:</label>
    <textarea name="descripcion" required></textarea>
    <label>Veterinario:</label>
    <input type="text" name="veterinario" th:value="${registro.veterinarioResponsable}" required>
    <button type="submit">Agregar diagnóstico</button>
</form>

<h2>Tratamientos</h2>
<table th:if="${!registro.tratamientos.isEmpty()}">
    <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Instrucciones</th>
    </tr>
    <tr th:each="t : ${registro.tratamientos}">
        <td th:text="${t.nombre}"></td>
        <td th:text="${t.descripcion}"></td>
        <td th:text="${t.instrucciones}"></td>
    </tr>
</table>
<form th:action="@{/registros-medicos/{id}/tratamiento(id=${registro.id})}" method="post">
    <label>Nombre:</label>
    <input type="text" name="nombre" required>
    <label>Descripción:</label>
    <textarea name="descripcion" required></textarea>
    <label>Instrucciones:</label>
    <textarea name="instrucciones" required></textarea>
    <button type="submit">Agregar tratamiento</button>
</form>

<h2>Medicamentos</h2>
<table th:if="${!registro.medicamentos.isEmpty()}">
    <tr>
        <th>Nombre</th>
        <th>Dosis</th>
        <th>Frecuencia</th>
        <th>Vía</th>
        <th>Días</th>
    </tr>
    <tr th:each="m : ${registro.medicamentos}">
        <td th:text="${m.nombre}"></td>
        <td th:text="${m.dosis}"></td>
        <td th:text="${m.frecuencia}"></td>
        <td th:text="${m.viaAdministracion}"></td>
        <td th:text="${m.duracionDias}"></td>
    </tr>
</table>
<form th:action="@{/registros-medicos/{id}/medicamento(id=${registro.id})}" method="post">
    <label>Nombre:</label>
    <input type="text" name="nombre" required>
    <label>Dosis:</label>
    <input type="text" name="dosis" required>
    <label>Frecuencia:</label>
    <input type="text" name="frecuencia" required>
    <label>Vía de administración:</label>
    <input type="text" name="viaAdministracion" required>
    <label>Duración (días):</label>
    <input type="number" name="duracionDias" min="1" required>
    <button type="submit">Agregar medicamento</button>
</form>

<h2>Notas Médicas</h2>
<table th:if="${!registro.notas.isEmpty()}">
    <tr>
        <th>Contenido</th>
        <th>Autor</th>
        <th>Fecha</th>
    </tr>
    <tr th:each="n : ${registro.notas}">
        <td th:text="${n.contenido}"></td>
        <td th:text="${n.autor}"></td>
        <td th:text="${n.fecha != null ? #temporals.format(n.fecha, 'dd/MM/yyyy HH:mm') : 'N/A'}"></td>
    </tr>
</table>
<form th:action="@{/registros-medicos/{id}/nota(id=${registro.id})}" method="post">
    <label>Contenido:</label>
    <textarea name="contenido" required></textarea>
    <label>Autor:</label>
    <input type="text" name="autor" required>
    <button type="submit">Agregar nota</button>
</form>

<div class="nav-buttons">
    <form th:action="@{/registros-medicos/{id}/eliminar(id=${registro.id})}" method="post" onsubmit="return confirm('¿Eliminar este registro?');">
        <button type="submit" class="danger-btn">Eliminar</button>
    </form>
    <form th:action="@{/registros-medicos}">
        <button type="submit">Regresar</button>
    </form>
</div>

</body>
</html>

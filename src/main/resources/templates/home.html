<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Getting Started: Serving Web Content</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>
<h1 th:text="|Bienvenido a ${name}!|"></h1>
<div sec:authorize="isAuthenticated()">
    <h1 th:inline="text">Hola <span th:remove="tag" sec:authentication="name"></span>!</h1>
</div>

<div sec:authorize="!isAuthenticated()">
    <a th:href="@{/login}">
        <button>Iniciar sesión</button>
    </a>
</div>

<div sec:authorize="isAuthenticated()">
    <form th:action="@{/logout}" method="post">
        <button type="submit">Cerrar sesión</button>
    </form>
</div>

<div sec:authorize="isAuthenticated()">
    <form th:action="@{/pacientes}" >
        <button>Registrar pacientes</button>
    </form>
</div>

<div sec:authorize="isAuthenticated()">
    <form th:action="@{/citas}" >
        <button>Registrar citas</button>
    </form>
</div>

</body>

</html>

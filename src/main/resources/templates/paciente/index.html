<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - Veterinaria</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .hidden { display: none; }
        .loading { text-align: center; padding: 2rem; }
        .actions-column { display: flex; gap: 0.3rem; }
        .actions-column button { padding: 0.3rem 0.6rem; font-size: 0.85rem; }
    </style>
</head>
<body>
    <h1>Gestión de Pacientes</h1>

    <div class="nav-buttons">
        <a href="/panel"><button>Volver al Panel</button></a>
        <a href="/paciente/nuevo"><button>Nuevo Paciente</button></a>
        <button onclick="cargarPacientes()">Actualizar</button>
    </div>

    <div id="loading" class="loading hidden">Cargando pacientes...</div>
    <div id="error" class="error hidden"></div>

    <div id="pacientes-container">
        <h2>Lista de Pacientes</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Especie</th>
                    <th>Raza</th>
                    <th>Edad</th>
                    <th>Dueño</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="pacientes-body">
                <!-- Se llenará dinámicamente -->
            </tbody>
        </table>
    </div>

    <script src="/auth-utils.js"></script>
    <script>
        // Verificar autenticación
        requireAuth();

        // Cargar pacientes al iniciar
        cargarPacientes();

        async function cargarPacientes() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tbody = document.getElementById('pacientes-body');

            loading.classList.remove('hidden');
            error.classList.add('hidden');

            try {
                const response = await fetch('/api/pacientes', {
                    headers: authHeaders()
                });

                if (!response.ok) {
                    if (handleAuthError(response)) return;
                    throw new Error('Error al cargar pacientes');
                }

                const pacientes = await response.json();
                tbody.innerHTML = '';

                if (pacientes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No hay pacientes registrados</td></tr>';
                    return;
                }

                pacientes.forEach(paciente => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${paciente.id}</td>
                        <td>${paciente.nombre || 'N/A'}</td>
                        <td>${paciente.especie || 'N/A'}</td>
                        <td>${paciente.raza || 'N/A'}</td>
                        <td>${paciente.edad || 'N/A'} años</td>
                        <td>${paciente.dueno || 'N/A'}</td>
                        <td class="actions-column">
                            <a href="/paciente/detalle?id=${paciente.id}"><button>Ver</button></a>
                            <button onclick="eliminarPaciente(${paciente.id})" class="danger-btn">Eliminar</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                error.textContent = err.message;
                error.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        async function eliminarPaciente(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este paciente?')) {
                return;
            }

            try {
                const response = await fetch(`/api/pacientes/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });

                if (!response.ok) {
                    if (handleAuthError(response)) return;
                    throw new Error('Error al eliminar paciente');
                }

                alert('Paciente eliminado correctamente');
                cargarPacientes();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    </script>
</body>
</html>

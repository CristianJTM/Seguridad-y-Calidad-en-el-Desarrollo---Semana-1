<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Veterinaria - Registros</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>

<body>

<h1>Registro de Consultas</h1>

<form th:action="@{/registros}" method="post">
    <label>Cita:</label>
    <select name="citaId" required>
        <option th:each="c : ${citas}"
                th:value="${c.id}"
                th:text="${c.paciente.nombre + ' - ' + c.fecha + ' ' + c.hora}">
        </option>
    </select>

    <label>Diagnóstico:</label>
    <input type="text" name="diagnostico" required>

    <label>Tratamiento:</label>
    <input type="text" name="tratamiento" required>

    <label>Medicamentos:</label>
    <input type="text" name="medicamentos">

    <button type="submit">Guardar Registro</button>
</form>

<div class="nav-buttons">
    <form th:action="@{/home}">
        <button>Regresar</button>
    </form>
</div>

<h2>Lista de Registros</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Cita</th>
        <th>Diagnóstico</th>
        <th>Tratamiento</th>
        <th>Medicamentos</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="registro : ${registros}">
        <td th:text="${registro.id}"></td>
        <td th:text="${registro.cita.paciente.nombre + ' - ' + registro.cita.fecha + ' ' + registro.cita.hora}"></td>
        <td th:text="${registro.diagnostico}"></td>
        <td th:text="${registro.tratamiento}"></td>
        <td th:text="${registro.medicamentos}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>

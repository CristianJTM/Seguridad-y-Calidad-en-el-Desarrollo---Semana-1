<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria - Panel JWT</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .hidden { display: none; }
        .section { margin: 1.5rem 0; }
        .token-info { background: #d4edda; padding: 0.8rem; border-radius: 6px; margin: 1rem 0; word-break: break-all; font-size: 0.85rem; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
        #login-section { max-width: 400px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
    <h1>Veterinaria - Login JWT</h1>
    <div id="login-error" class="error hidden"></div>
    <form id="login-form">
        <label>Usuario:</label>
        <input type="text" id="username" required>
        <label>Contraseña:</label>
        <input type="password" id="password" required>
        <br><br>
        <button type="submit">Ingresar</button>
    </form>
</div>

<!-- PANEL PRINCIPAL -->
<div id="main-section" class="hidden">
    <h1>Veterinaria</h1>
    <p>Conectado como: <strong id="user-info"></strong> (Rol: <span id="role-info"></span>)</p>
    <div class="token-info">Token: <span id="token-display"></span></div>
    <div class="actions">
        <button onclick="cargarPacientes()">Ver Pacientes</button>
        <button onclick="mostrar('nuevo-paciente')">Registrar Paciente</button>
        <button onclick="cargarCitas()">Ver Citas</button>
        <button onclick="mostrar('nueva-cita')">Programar Cita</button>
        <button onclick="cerrarSesion()" class="danger-btn">Cerrar Sesión</button>
    </div>

    <!-- LISTA PACIENTES -->
    <div id="lista-pacientes" class="section hidden">
        <h2>Pacientes</h2>
        <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Especie</th><th>Raza</th><th>Edad</th><th>Dueño</th></tr></thead>
            <tbody id="pacientes-body"></tbody>
        </table>
    </div>

    <!-- NUEVO PACIENTE -->
    <div id="nuevo-paciente" class="section hidden">
        <h2>Registrar Paciente</h2>
        <form id="paciente-form">
            <label>Nombre:</label>
            <input type="text" id="pac-nombre" required>
            <label>Especie:</label>
            <input type="text" id="pac-especie" required>
            <label>Raza:</label>
            <input type="text" id="pac-raza" required>
            <label>Edad:</label>
            <input type="number" id="pac-edad" required>
            <label>Dueño:</label>
            <input type="text" id="pac-dueno" required>
            <br><br>
            <button type="submit">Registrar</button>
        </form>
        <div id="pac-msg" class="message hidden"></div>
    </div>

    <!-- LISTA CITAS -->
    <div id="lista-citas" class="section hidden">
        <h2>Citas</h2>
        <table>
            <thead><tr><th>ID</th><th>Paciente</th><th>Fecha</th><th>Hora</th><th>Motivo</th><th>Veterinario</th></tr></thead>
            <tbody id="citas-body"></tbody>
        </table>
    </div>

    <!-- NUEVA CITA -->
    <div id="nueva-cita" class="section hidden">
        <h2>Programar Cita</h2>
        <form id="cita-form">
            <label>Paciente:</label>
            <select id="cita-paciente" required></select>
            <label>Fecha:</label>
            <input type="date" id="cita-fecha" required>
            <label>Hora:</label>
            <input type="time" id="cita-hora" required>
            <label>Motivo de consulta:</label>
            <input type="text" id="cita-motivo" required>
            <label>Veterinario asignado:</label>
            <input type="text" id="cita-vet" required>
            <br><br>
            <button type="submit">Programar</button>
        </form>
        <div id="cita-msg" class="message hidden"></div>
    </div>
</div>

<script>
let token = null;

// --- Auth ---
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    });

    if (!res.ok) {
        document.getElementById('login-error').textContent = 'Credenciales inválidas';
        document.getElementById('login-error').classList.remove('hidden');
        return;
    }

    const data = await res.json();
    token = data.token;
    document.getElementById('user-info').textContent = data.username;
    document.getElementById('role-info').textContent = data.role;
    document.getElementById('token-display').textContent = token.substring(0, 40) + '...';
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('main-section').classList.remove('hidden');
});

function cerrarSesion() {
    token = null;
    document.getElementById('main-section').classList.add('hidden');
    document.getElementById('login-section').classList.remove('hidden');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('login-error').classList.add('hidden');
}

function headers() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

function mostrar(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if (id === 'nueva-cita') cargarPacientesSelect();
}

// --- Pacientes ---
async function cargarPacientes() {
    mostrar('lista-pacientes');
    const res = await fetch('/api/pacientes', { headers: headers() });
    const pacientes = await res.json();
    const body = document.getElementById('pacientes-body');
    body.innerHTML = pacientes.map(p =>
        `<tr><td>${p.id}</td><td>${p.nombre}</td><td>${p.especie}</td><td>${p.raza}</td><td>${p.edad}</td><td>${p.dueno}</td></tr>`
    ).join('');
}

document.getElementById('paciente-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const paciente = {
        nombre: document.getElementById('pac-nombre').value,
        especie: document.getElementById('pac-especie').value,
        raza: document.getElementById('pac-raza').value,
        edad: parseInt(document.getElementById('pac-edad').value),
        dueno: document.getElementById('pac-dueno').value
    };

    const res = await fetch('/api/pacientes', { method: 'POST', headers: headers(), body: JSON.stringify(paciente) });
    const msg = document.getElementById('pac-msg');
    if (res.ok) {
        msg.textContent = 'Paciente registrado correctamente';
        msg.classList.remove('hidden');
        e.target.reset();
    } else {
        msg.textContent = 'Error al registrar paciente';
        msg.classList.remove('hidden');
    }
});

// --- Citas ---
async function cargarCitas() {
    mostrar('lista-citas');
    const res = await fetch('/api/citas', { headers: headers() });
    const citas = await res.json();
    const body = document.getElementById('citas-body');
    body.innerHTML = citas.map(c =>
        `<tr><td>${c.id}</td><td>${c.paciente.nombre}</td><td>${c.fecha}</td><td>${c.hora}</td><td>${c.motivoConsulta}</td><td>${c.veterinarioAsignado}</td></tr>`
    ).join('');
}

async function cargarPacientesSelect() {
    const res = await fetch('/api/pacientes', { headers: headers() });
    const pacientes = await res.json();
    const select = document.getElementById('cita-paciente');
    select.innerHTML = pacientes.map(p => `<option value="${p.id}">${p.nombre} (${p.especie})</option>`).join('');
}

document.getElementById('cita-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const cita = {
        pacienteId: parseInt(document.getElementById('cita-paciente').value),
        fecha: document.getElementById('cita-fecha').value,
        hora: document.getElementById('cita-hora').value,
        motivoConsulta: document.getElementById('cita-motivo').value,
        veterinarioAsignado: document.getElementById('cita-vet').value
    };

    const res = await fetch('/api/citas', { method: 'POST', headers: headers(), body: JSON.stringify(cita) });
    const msg = document.getElementById('cita-msg');
    if (res.ok) {
        msg.textContent = 'Cita programada correctamente';
        msg.classList.remove('hidden');
        e.target.reset();
    } else {
        msg.textContent = 'Error al programar cita';
        msg.classList.remove('hidden');
    }
});
</script>
</body>
</html>
